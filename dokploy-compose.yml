# ==============================================================================
# dokploy-compose.yml
# reactive-resume — cv.umhl.dev → Traefik:80 → rxresume-app:3000
#
# Environment variables to set in Dokploy UI:
# - PRINTER_ENDPOINT: ws://printer:3000?token=<your-printer-token>
# - PRINTER_TOKEN: <your-printer-token> (used by browserless and for the endpoint)
# ==============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - internal
      - dokploy-network
    environment:
      - APP_URL=https://cv.umhl.dev
      - AUTH_SECRET=${AUTH_SECRET}
      - PRINTER_ENDPOINT=${PRINTER_ENDPOINT}
      - PRINTER_APP_URL=http://app:3000
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@postgres:5432/postgres
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_REGION=${S3_REGION}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
      - S3_FORCE_PATH_STYLE=false
      - FLAG_DISABLE_SIGNUPS=${FLAG_DISABLE_SIGNUPS:-false}
    depends_on:
      postgres:
        condition: service_healthy
      printer:
        condition: service_started
    # FIXME: Temporary diagnostic — the app returns 503 when dependencies are unhealthy.
    # This makes Docker mark the container unhealthy, which may prevent Traefik routing.
    # Using wget without -f so the healthcheck passes regardless of HTTP status.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1 || true"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rxresume.rule=Host(`cv.umhl.dev`)"
      - "traefik.http.routers.rxresume.entrypoints=web"
      - "traefik.http.services.rxresume.loadbalancer.server.port=3000"
      - "traefik.docker.network=dokploy-network"

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    networks:
      - internal
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  printer:
    image: ghcr.io/browserless/chromium:latest
    restart: unless-stopped
    networks:
      - internal
      - dokploy-network
    environment:
      - TOKEN=${PRINTER_TOKEN}
      - TIMEOUT=60000
      - CONCURRENT=10
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:3000/pressure?token=${PRINTER_TOKEN}",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.printer.rule=Host(`printer.cv.umhl.dev`)"
      - "traefik.http.routers.printer.entrypoints=web"
      - "traefik.http.routers.printer.service=printer-svc"
      - "traefik.http.services.printer-svc.loadbalancer.server.port=3000"

networks:
  internal:
    driver: bridge
  dokploy-network:
    # Dokploy already created this in swarm mode
    external: true

volumes:
  postgres-data:
